<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proton Drive — Desktop Sync</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 20 106 95'%3E%3Cpath fill-rule='evenodd' clip-rule='evenodd' d='M49.9553 33.7554H95.0391C101.095 33.7554 106 38.6208 106 44.6278V101.117C106 107.124 101.095 111.989 95.0391 111.989H83.4637V55.256C83.4637 50.568 79.6201 46.7666 74.8827 46.7999L33.3631 47.0326C31.5754 47.0437 29.8324 46.4926 28.3687 45.4619L19.1173 38.9532C17.676 37.9336 15.9441 37.3906 14.1788 37.3906H0V35.8722C0 29.8654 4.90503 25 10.9609 25H31.5307C33.6089 25 35.6313 25.6539 37.2961 26.873L44.1788 31.8824C45.8547 33.1015 47.8771 33.7554 49.9553 33.7554Z' fill='%23a78bfa'/%3E%3Cpath d='M74.8827 46.7999L33.3631 47.0326C31.5754 47.0437 29.8324 46.4926 28.3687 45.4619L19.1173 38.9532C17.676 37.9336 15.9441 37.3906 14.1788 37.3906H0V101.128C0 107.135 4.90503 112 10.9609 112H83.4637V55.256C83.4637 50.568 79.6201 46.7666 74.8827 46.7999Z' fill='%236d4aff'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body:      #1e202b;
            --bg-sidebar:   #141620;
            --bg-card:      #252839;
            --border-color: #2e3248;
            --primary:      #6c47ff;
            --text-main:    #f1f5f9;
            --text-muted:   #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar — matches the dashboard sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            flex-shrink: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2rem;
            padding-left: 0.5rem;
        }

        .proton-logo { width: 32px; height: 32px; flex-shrink: 0; }

        .brand-name {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sub-brand {
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--primary);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .nav-skeleton {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav-skeleton-item {
            height: 44px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            animation: shimmer 1.6s ease-in-out infinite;
        }

        .sidebar-footer {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .storage-skeleton {
            height: 72px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            animation: shimmer 1.6s ease-in-out infinite;
        }

        .user-skeleton {
            height: 56px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            animation: shimmer 1.6s ease-in-out 0.2s infinite;
        }

        @keyframes shimmer {
            0%   { opacity: 0.5; }
            50%  { opacity: 0.8; }
            100% { opacity: 0.5; }
        }

        /* Main content area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            height: 70px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            gap: 1rem;
        }

        .topbar-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.3px;
        }

        .content-area {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Loading card */
        .loading-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .spinner-wrap {
            width: 52px;
            height: 52px;
            position: relative;
            flex-shrink: 0;
        }

        .spinner-track {
            position: absolute;
            inset: 0;
            border: 3px solid rgba(108, 71, 255, 0.12);
            border-radius: 50%;
        }

        .spinner-arc {
            position: absolute;
            inset: 0;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-right-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .loading-text p {
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        /* Skeleton placeholder cards */
        .skeleton-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
        }

        .skeleton-line {
            height: 12px;
            background: rgba(255,255,255,0.06);
            border-radius: 6px;
            animation: shimmer 1.6s ease-in-out infinite;
            margin-bottom: 12px;
        }

        .skeleton-line.w-40 { width: 40%; }
        .skeleton-line.w-60 { width: 60%; }
        .skeleton-line.w-80 { width: 80%; }
        .skeleton-line.w-100 { width: 100%; }
    </style>
</head>
<body>
    <!-- Sidebar skeleton — matches dashboard layout -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <svg class="proton-logo" viewBox="0 20 106 95" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M49.9553 33.7554H95.0391C101.095 33.7554 106 38.6208 106 44.6278V101.117C106 107.124 101.095 111.989 95.0391 111.989H83.4637V55.256C83.4637 50.568 79.6201 46.7666 74.8827 46.7999L33.3631 47.0326C31.5754 47.0437 29.8324 46.4926 28.3687 45.4619L19.1173 38.9532C17.676 37.9336 15.9441 37.3906 14.1788 37.3906H0V35.8722C0 29.8654 4.90503 25 10.9609 25H31.5307C33.6089 25 35.6313 25.6539 37.2961 26.873L44.1788 31.8824C45.8547 33.1015 47.8771 33.7554 49.9553 33.7554Z" fill="#a78bfa"/>
                <path d="M74.8827 46.7999L33.3631 47.0326C31.5754 47.0437 29.8324 46.4926 28.3687 45.4619L19.1173 38.9532C17.676 37.9336 15.9441 37.3906 14.1788 37.3906H0V101.128C0 107.135 4.90503 112 10.9609 112H83.4637V55.256C83.4637 50.568 79.6201 46.7666 74.8827 46.7999Z" fill="#6d4aff"/>
            </svg>
            <span class="brand-name">Proton Drive<span class="sub-brand">Sync</span></span>
        </div>

        <div class="nav-skeleton">
            <div class="nav-skeleton-item"></div>
            <div class="nav-skeleton-item" style="opacity:0.5;"></div>
        </div>

        <div class="sidebar-footer">
            <div class="storage-skeleton"></div>
            <div class="user-skeleton"></div>
        </div>
    </aside>

    <!-- Main content skeleton -->
    <main class="main-content">
        <div class="topbar">
            <span class="topbar-title">Sync Dashboard</span>
        </div>

        <div class="content-area">
            <!-- Spinner card -->
            <div class="loading-card">
                <div class="spinner-wrap">
                    <div class="spinner-track"></div>
                    <div class="spinner-arc"></div>
                </div>
                <div class="loading-text">
                    <h2 id="status-text">Starting sync service…</h2>
                    <p id="status-sub">Connecting to background daemon</p>
                </div>
            </div>

            <!-- Skeleton placeholder for the log card -->
            <div class="skeleton-card">
                <div class="skeleton-line w-40" style="height:16px;margin-bottom:1.5rem;"></div>
                <div class="skeleton-line w-100"></div>
                <div class="skeleton-line w-80"></div>
                <div class="skeleton-line w-60"></div>
                <div class="skeleton-line w-100"></div>
                <div class="skeleton-line w-40" style="margin-bottom:0;"></div>
            </div>
        </div>
    </main>

    <script>
        const statusText = document.getElementById('status-text');
        const statusSub  = document.getElementById('status-sub');
        let attempts = 0;

        async function checkDaemon() {
            attempts++;
            if (attempts > 4) {
                statusText.innerText = 'Launching sync engine…';
                statusSub.innerText  = `Attempt ${attempts} — daemon may still be starting`;
            }

            try {
                const res = await fetch('http://localhost:8085/api/status');
                if (res.ok) {
                    statusText.innerText = 'Connected!';
                    statusSub.innerText  = 'Loading dashboard…';
                    setTimeout(() => { window.location.href = 'http://localhost:8085/'; }, 300);
                    return;
                }
            } catch {}

            setTimeout(checkDaemon, 1000);
        }

        setTimeout(checkDaemon, 500);
    </script>
</body>
</html>
