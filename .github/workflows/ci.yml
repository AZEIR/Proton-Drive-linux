name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-tauri:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Install Root Dependencies
        run: bun install

      - name: Install CLI Dependencies
        working-directory: ./sdk/js/cli
        run: bun install

      - name: Install SDK Dependencies
        working-directory: ./sdk/js/sdk
        run: bun install

      - name: Build Sync and FUSE Daemons
        run: |
          bun run compile:fuse
          bun run compile:sync

      - name: Verify Daemon Binaries
        run: |
          ls -lh sdk/js/cli/release/proton-fuse sdk/js/cli/release/proton-sync
          test -f sdk/js/cli/release/proton-sync || (echo "ERROR: proton-sync missing" && exit 1)
          test -f sdk/js/cli/release/proton-fuse || (echo "ERROR: proton-fuse missing" && exit 1)

      - name: Build Desktop Application
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: 1
        run: bun run tauri build

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProtonDrive-linux-x86_64
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          compression-level: 0
          if-no-files-found: error

      - name: Create or Update GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Development Build"
          body: "Latest automatically compiled AppImage from the main branch."
          prerelease: true
          make_latest: true
          files: src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-js-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install SDK Dependencies
        run: bun install
        working-directory: ./sdk/js/sdk

      - name: Run Test Suite
        run: bun run test
        working-directory: ./sdk/js/sdk
