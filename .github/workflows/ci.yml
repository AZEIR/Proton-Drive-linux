name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-tauri:
    runs-on: ubuntu-latest  # Allocates a clean, managed Ubuntu VM
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Dependencies
        run: |
          bun install
          cd sdk/js/cli && bun install

      - name: Build Sync and FUSE Daemons
        run: |
          cd sdk/js/cli
          bun run build:fuse
          bun run build:sync

      - name: Build Desktop Application
        run: bun run tauri build

  test-js-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install SDK Dependencies
        run: bun install
        working-directory: ./sdk/js/sdk

      - name: Run Test Suite
        run: bun test
        working-directory: ./sdk/js/sdk

  build-swift-sdk:
    runs-on: macos-latest  # Allocates a clean, managed Apple Silicon VM
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Swift Build
        run: swift build
        working-directory: ./sdk/swift/ProtonDriveSDK
