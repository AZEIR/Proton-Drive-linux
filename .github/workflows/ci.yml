name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-tauri:
    runs-on: ubuntu-latest  # Allocates a clean, managed Ubuntu VM
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Root Dependencies
        run: bun install

      - name: Install CLI Dependencies
        working-directory: ./sdk/js/cli
        run: bun install

      - name: Print CLI package.json
        run: |
          cat sdk/js/cli/package.json

      - name: Build Sync and FUSE Daemons
        run: |
          echo "=== Building FUSE Daemon ==="
          bun run compile:fuse > compile_fuse.log 2>&1 || {
            err_msg=$(cat compile_fuse.log | head -n 100 | python3 -c "import sys; print(sys.stdin.read().replace('\n', '%0A'))")
            echo "::error::FUSE Compilation Failed:%0A$err_msg"
            exit 1
          }
          echo "=== Building Sync Daemon ==="
          bun run compile:sync > compile_sync.log 2>&1 || {
            err_msg=$(cat compile_sync.log | head -n 100 | python3 -c "import sys; print(sys.stdin.read().replace('\n', '%0A'))")
            echo "::error::Sync Compilation Failed:%0A$err_msg"
            exit 1
          }

      - name: Diagnostic - Find Daemons
        run: |
          echo "=== Finding compiled daemons ==="
          find . -name "proton-fuse" -o -name "proton-sync"
          echo "=== Root contents ==="
          ls -la
          echo "=== CLI release contents ==="
          ls -la sdk/js/cli/release || echo "sdk/js/cli/release not found"

      - name: Build Desktop Application
        run: bun run tauri build

  test-js-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install SDK Dependencies
        run: bun install
        working-directory: ./sdk/js/sdk

      - name: Run Test Suite
        run: bun test
        working-directory: ./sdk/js/sdk

  build-swift-sdk:
    runs-on: macos-latest  # Allocates a clean, managed Apple Silicon VM
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Swift Build
        run: swift build
        working-directory: ./sdk/swift/ProtonDriveSDK
