name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-tauri:
    runs-on: ubuntu-latest  # Allocates a clean, managed Ubuntu VM
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-node: '20'
          cache: 'bun' # Adjust based on your preferred package manager

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        run: bun install
        working-directory: ./sdk/js/cli

      - name: Build Desktop Application Backend
        run: bun tauri build

  test-js-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install SDK Dependencies
        run: bun install
        working-directory: ./sdk/js/sdk

      - name: Run Test Suite
        run: bun test
        working-directory: ./sdk/js/sdk

  build-swift-sdk:
    runs-on: macos-latest  # Allocates a clean, managed Apple Silicon VM
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Swift Build
        run: swift build
        working-directory: ./sdk/swift/ProtonDriveSDK
