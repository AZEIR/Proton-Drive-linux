name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-tauri:
    runs-on: ubuntu-latest  # Allocates a clean, managed Ubuntu VM
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Root Dependencies
        run: bun install

      - name: Install CLI Dependencies
        working-directory: ./sdk/js/cli
        run: bun install

      - name: Install SDK Dependencies
        working-directory: ./sdk/js/sdk
        run: bun install

      - name: Print CLI package.json
        run: |
          cat sdk/js/cli/package.json

      - name: Build Sync and FUSE Daemons
        run: |
          echo "=== Building FUSE Daemon ==="
          bun run compile:fuse
          echo "=== Building Sync Daemon ==="
          bun run compile:sync

      - name: Diagnostic - Find Daemons
        run: |
          echo "=== Finding compiled daemons ==="
          find . -name "proton-fuse" -o -name "proton-sync"
          echo "=== Root contents ==="
          ls -la
          echo "=== CLI release contents ==="
          ls -la sdk/js/cli/release || echo "sdk/js/cli/release not found"

      - name: Build Desktop Application
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          LD_EXCLUDE_LIBS: "libwayland-client.so.0;libwayland-server.so.0;libwayland-egl.so.1"
        run: bun run tauri build

      - name: Upload AppImage Package
        uses: actions/upload-artifact@v4
        with:
          name: proton-drive-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Debian Package
        uses: actions/upload-artifact@v4
        with:
          name: proton-drive-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  test-js-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install SDK Dependencies
        run: bun install
        working-directory: ./sdk/js/sdk

      - name: Run Test Suite
        run: bun run test
        working-directory: ./sdk/js/sdk


